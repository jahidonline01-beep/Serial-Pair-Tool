name: Build APK

on:
  workflow_dispatch:
  push:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Setup project structure
        run: |
          mkdir -p app/src/main/java/com/serialpair/tool
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/mipmap-mdpi
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          mkdir -p app/src/main/res/mipmap-xxxhdpi

          cp AndroidManifest.xml app/src/main/AndroidManifest.xml
          cp MainActivity.kt     app/src/main/java/com/serialpair/tool/MainActivity.kt
          cp index.html          app/src/main/assets/index.html
          cp app-build.gradle    app/build.gradle

          cp ic_launcher.png app/src/main/res/mipmap-mdpi/ic_launcher.png
          cp ic_launcher.png app/src/main/res/mipmap-hdpi/ic_launcher.png
          cp ic_launcher.png app/src/main/res/mipmap-xhdpi/ic_launcher.png
          cp ic_launcher.png app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          cp ic_launcher.png app/src/main/res/mipmap-xxxhdpi/ic_launcher.png

      - name: Install Gradle 8.7
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.7-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle-dist
          echo "/tmp/gradle-dist/gradle-8.7/bin" >> $GITHUB_PATH

      - name: Build debug APK
        run: gradle :app:assembleDebug --no-daemon --stacktrace

      - uses: actions/upload-artifact@v4
        with:
          name: serial-pair-tool-apk
          path: app/build/outputs/apk/debug/*.apk
          retention-days: 30
